server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # --- Compression ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain text/css application/json
        application/javascript text/xml application/xml
        text/javascript image/svg+xml;

    # --- Proxy API to backend container ---
    location /api/ {
        proxy_pass         http://backend:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
        # Pass the original Origin so backend CORS logic sees it
        proxy_set_header   Origin            $http_origin;
    }

    # --- Aggressive caching for hashed static assets ---
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # --- SPA fallback: all unknown routes → index.html ---
    location / {
        try_files $uri $uri/ /index.html;
    }
}
